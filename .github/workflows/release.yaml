---
name: Release

on:
  push:
    tags: ["*"]

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish ${{ matrix.service }} (${{ matrix.system }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - rss-poller
          - rss-notify
          - rss-locator
          - rss-frontend
        system:
          - aarch64-linux
          - x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          extra_nix_config: |
            extra-platforms = aarch64-linux

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.service }} image
        run: |
          IMAGE="${{ matrix.service }}"
          IMAGE="${IMAGE//-/_}"
          echo "image=${IMAGE}" >> "$GITHUB_ENV"
          nix build .#packages.${{ matrix.system }}.${{ matrix.service }}-docker
          docker image load --input result

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.image }}:latest
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Push ${{ matrix.service }} image
        run: |
          docker image tag "${{ env.image }}:latest" \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.image }}-${{ matrix.system }}:${{ github.ref_name }}"
          docker push \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.image }}-${{ matrix.system }}:${{ github.ref_name }}"
