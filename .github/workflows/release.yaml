---
name: Release

on:
  push:
    tags: ["*"]

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish ${{ matrix.service }} (${{ matrix.config.system }})
    runs-on: ${{ matrix.config.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - rss-poller
          - rss-notify
          - rss-locator
          - rss-frontend
        config:
          - { system: x86_64-linux, runner: ubuntu-latest }
          - { system: aarch64-linux, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            sandbox = false

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: nix build .#${{ matrix.service }} --option sandbox false
      - name: Build ${{ matrix.service }} image
        run: |
          IMAGE="${{ matrix.service }}"
          IMAGE="${IMAGE//-/_}"
          echo "image=${IMAGE}" >> "$GITHUB_ENV"
          nix build .#packages.${{ matrix.config.system }}.${{ matrix.service }}-docker
          docker image load --input result

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.image }}:latest
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Push ${{ matrix.service }} image
        run: |
          docker image tag "${{ env.image }}:latest" \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.image }}-${{ matrix.config.system }}:${{ github.ref_name }}"
          docker push \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.image }}-${{ matrix.config.system }}:${{ github.ref_name }}"
