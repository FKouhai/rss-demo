---
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.diff.outputs.any }}
      matrix: ${{ steps.diff.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff
        id: diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-list --max-parents=0 HEAD)"
          else
            BASE="${{ github.event.before }}"
          fi

          # Fallback if the base SHA isn't reachable (force-push, shallow clone edge cases)
          if ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          fi

          CHANGED="$(git diff --name-only "$BASE" "${{ github.sha }}")"
          echo "Changed files:" && echo "$CHANGED"

          shared_changed() {
            echo "$CHANGED" | grep -qE '^(flake\.(nix|lock)|nix/|govendor\.toml|libs/)'
          }

          ITEMS=()
          for svc in rss_poller rss_notify rss_locator rss_frontend; do
            if shared_changed || echo "$CHANGED" | grep -qE "^${svc}/"; then
              nix_name="${svc//_/-}"
              if   [ -f "${svc}/go.mod" ];      then type="go"
              elif [ -f "${svc}/Cargo.toml" ];  then type="rust"
              else                                   type="nodejs"
              fi
              ITEMS+=("{\"service\":\"${nix_name}\",\"type\":\"${type}\"}")
            fi
          done

          JSON="[$(IFS=,; echo "${ITEMS[*]}")]"
          echo "matrix={\"include\":${JSON}}" >> "$GITHUB_OUTPUT"
          [ "${#ITEMS[@]}" -gt 0 ] && echo "any=true" >> "$GITHUB_OUTPUT" || echo "any=false" >> "$GITHUB_OUTPUT"

  check:
    name: Check ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            sandbox = false

      - name: Lint
        if: matrix.type == 'go'
        run: nix build .#checks.x86_64-linux.${{ matrix.service }}-lint

      - name: Test
        if: matrix.type == 'go'
        run: nix build .#checks.x86_64-linux.${{ matrix.service }}-test --option sandbox false

  build:
    name: Build ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            sandbox = false
      - run: nix build .#${{ matrix.service }} --option sandbox false

  scan:
    name: Trivy filesystem scan
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan dependencies and source
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
