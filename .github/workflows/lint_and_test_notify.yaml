---
name: "Lint and test PR's for notify"
on:
  push:
    paths:
      - 'rss_notify/**'
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths:
      - 'rss_notify/**'
      - 'flake.nix'
      - 'flake.lock'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            sandbox = false
      - name: Run tests
        run: nix build .#checks.x86_64-linux.rss-notify-test --option sandbox false
      - name: Run lint
        run: nix build .#checks.x86_64-linux.rss-notify-lint --option sandbox false
