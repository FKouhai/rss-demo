---
name: "Lint and test PR's for locator"
on:
  push:
    paths:
      - 'rss_locator/**'
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths:
      - 'rss_locator/**'
      - 'flake.nix'
      - 'flake.lock'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            sandbox = false
      - name: Run tests
        run: |
          cd rss_locator && cargo test -- --test-threads=1
